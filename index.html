<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Universal Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }
        #inputWrapper { width: 100%; max-width: 500px; text-align: center; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #333; background: #1a1a1a; color: white; outline: none; margin-bottom: 10px; font-size: 14px; }
        .play-btn { width: 100%; background: #ff0000; color: white; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 16px; }
        .player-wrapper { width: 100%; max-width: 850px; background: #111; border-radius: 15px; overflow: hidden; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.9); }
        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
        .controls { padding: 15px; background: #1a1a1a; }
        .btn-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        button, select { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .share-btn { width: 100%; background: #007bff; color: white; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="inputWrapper">
        <h2 style="color: #ff0000;">Spider Official</h2>
        <input type="text" id="videoUrl" placeholder="MP4 ya M3U8 link yahan dalein...">
        <button class="play-btn" onclick="startManual()">Play Now</button>
    </div>

    <div id="playerContainer" class="player-wrapper">
        <video id="mainVid" playsinline controls crossorigin="anonymous"></video>
        <div class="controls">
            <div class="btn-row">
                <select onchange="mainVid.playbackRate=this.value">
                    <option value="1">1x Speed</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
                <button onclick="location.reload()">New Link</button>
            </div>
            <button id="copyBtn" class="share-btn" onclick="generateAndCopy()">🔗 Copy Share Link</button>
        </div>
    </div>

<script>
    const mainVid = document.getElementById('mainVid');
    const inputWrapper = document.getElementById('inputWrapper');
    const playerContainer = document.getElementById('playerContainer');
    const urlInput = document.getElementById('videoUrl');
    let savedRawUrl = "";

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('v');
        if(encoded) {
            try { loadPlayer(atob(encoded)); } catch(e) {}
        }
    };

    function startManual() {
        const url = urlInput.value.trim();
        if(url) loadPlayer(url);
    }

    function loadPlayer(url) {
        savedRawUrl = url;
        inputWrapper.style.display = 'none';
        playerContainer.style.display = 'block';

        // Check if link is .m3u8
        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(mainVid);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    mainVid.play();
                });
            } 
            // For Safari (iPhone/Mac) which supports HLS natively
            else if (mainVid.canPlayType('application/vnd.apple.mpegurl')) {
                mainVid.src = url;
                mainVid.addEventListener('loadedmetadata', function() {
                    mainVid.play();
                });
            }
        } else {
            // Normal MP4 handling
            mainVid.src = url;
            mainVid.play().catch(e => console.log("Autoplay blocked"));
        }
    }

    function generateAndCopy() {
        if(!savedRawUrl) return;
        const sharePath = window.location.origin + window.location.pathname + "?v=" + btoa(savedRawUrl);
        navigator.clipboard.writeText(sharePath).then(() => {
            document.getElementById('copyBtn').innerText = "✅ Link Copied!";
            setTimeout(() => document.getElementById('copyBtn').innerText = "🔗 Copy Share Link", 2000);
        });
    }
</script>

</body>
</html>
