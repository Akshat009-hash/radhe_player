<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Auto Player</title>
    <style>
        /* CSS Same as before with minor tweaks */
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }
        #inputWrapper { width: 100%; max-width: 500px; margin-bottom: 20px; text-align: center; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #333; background: #1a1a1a; color: white; outline: none; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; margin-bottom: 5px; }
        .play-btn { background: #ff0000; color: white; }
        .copy-btn { background: #007bff; color: white; display: none; }
        .player-wrapper { width: 100%; max-width: 800px; background: #111; border-radius: 15px; overflow: hidden; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.9); }
        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
        .controls { padding: 15px; background: #1a1a1a; }
        .buttons-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        button, select { background: #333; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="inputWrapper">
        <input type="text" id="videoUrl" placeholder="Video link yahan dalein...">
        <button class="btn play-btn" onclick="manualLoad()">Play Video</button>
        <button class="btn copy-btn" id="shareBtn" onclick="copyShareLink()">🔗 Copy Shareable Player Link</button>
    </div>

    <div id="playerContainer" class="player-wrapper">
        <video id="mainVid" playsinline controls></video>
        <div class="controls">
            <div class="buttons-row">
                <select onchange="mainVid.playbackRate=this.value">
                    <option value="1">1x Speed</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
                <button onclick="location.reload()">New Link</button>
            </div>
        </div>
    </div>

<script>
    const mainVid = document.getElementById('mainVid');
    const inputWrapper = document.getElementById('inputWrapper');
    const playerContainer = document.getElementById('playerContainer');
    const shareBtn = document.getElementById('shareBtn');

    // 1. Check if URL has an encrypted video link on load
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedUrl = urlParams.get('v');
        
        if(encodedUrl) {
            try {
                const decodedUrl = atob(encodedUrl); // Decrypting link
                startPlayer(decodedUrl);
            } catch(e) {
                console.error("Invalid Link");
            }
        }
    };

    function manualLoad() {
        const url = document.getElementById('videoUrl').value.trim();
        if(url) {
            startPlayer(url);
            shareBtn.style.display = 'block'; // Show copy button
        }
    }

    function startPlayer(url) {
        mainVid.src = url;
        inputWrapper.style.display = 'none';
        playerContainer.style.display = 'block';
        mainVid.play();
    }

    // 2. Encrypt and Create Shareable Link
    function copyShareLink() {
        const url = document.getElementById('videoUrl').value.trim();
        if(url) {
            const encrypted = btoa(url);
            const shareablePath = window.location.origin + window.location.pathname + "?v=" + encrypted;
            
            navigator.clipboard.writeText(shareablePath).then(() => {
                alert("Shareable Link Copied! Ab aap ise bhej sakte hain.");
            });
        }
    }
</script>

</body>
</html>
