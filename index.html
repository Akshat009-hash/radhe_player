<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Secure Player</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            min-height: 100vh; padding: 15px;
        }
        
        /* Input Section */
        #inputWrapper {
            width: 100%; max-width: 500px; margin-bottom: 20px;
            transition: 0.5s;
        }
        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 10px;
            border: 2px solid #333; background: #1a1a1a; color: white;
            outline: none; font-size: 16px; margin-bottom: 10px;
        }
        .load-btn {
            width: 100%; background: #ff0000; color: white; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold; 
            font-size: 16px; cursor: pointer;
        }

        /* Player Design */
        .player-wrapper {
            width: 100%; max-width: 800px; background: #111;
            border-radius: 15px; overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            display: none; /* Pehle hide rahega jab tak link na dale */
        }
        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }

        .controls { padding: 15px; background: #1a1a1a; }
        
        /* Modern Seek Bar */
        input[type="range"] { 
            width: 100%; height: 6px; accent-color: #ff0000; 
            cursor: pointer; margin-bottom: 15px;
        }

        .buttons-row { 
            display: flex; justify-content: space-between; 
            align-items: center; flex-wrap: wrap; gap: 10px;
        }
        
        .btn-group { display: flex; gap: 8px; }
        
        button, select { 
            background: #333; color: white; border: none; 
            padding: 10px 15px; border-radius: 8px; 
            font-size: 14px; cursor: pointer; font-weight: 600;
        }
        button:active { background: #444; transform: scale(0.95); }

        .time { font-size: 13px; font-family: monospace; color: #aaa; }
    </style>
</head>
<body>

    <div id="inputWrapper">
        <input type="text" id="videoUrl" placeholder="Video link yahan paste karein...">
        <button class="load-btn" onclick="loadVideo()">Play Now</button>
    </div>

    <div id="playerContainer" class="player-wrapper">
        <video id="mainVid" playsinline></video>

        <div class="controls">
            <input type="range" id="seek" value="0" min="0" max="100" step="0.1">
            
            <div class="buttons-row">
                <div class="btn-group">
                    <button onclick="toggleP()">Play/Pause</button>
                    <button onclick="skip(-10)">-10s</button>
                    <button onclick="skip(10)">+10s</button>
                </div>

                <div class="time" id="timer">00:00 / 00:00</div>

                <div class="btn-group">
                    <select id="speed" onchange="mainVid.playbackRate=this.value">
                        <option value="1">1x Speed</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                    <button onclick="fullSc()">Full</button>
                </div>
            </div>
        </div>
        <div style="text-align:center; padding: 5px; font-size: 10px; color: #444;">Refresh to change link</div>
    </div>

<script>
    const mainVid = document.getElementById('mainVid');
    const seek = document.getElementById('seek');
    const timer = document.getElementById('timer');
    const inputWrapper = document.getElementById('inputWrapper');
    const playerContainer = document.getElementById('playerContainer');

    function loadVideo() {
        const url = document.getElementById('videoUrl').value.trim();
        if(url) {
            mainVid.src = url;
            mainVid.play();
            
            // Hide Input and Show Player
            inputWrapper.style.display = 'none';
            playerContainer.style.display = 'block';
        } else {
            alert("Bhai link toh dalo!");
        }
    }

    function toggleP() { mainVid.paused ? mainVid.play() : mainVid.pause(); }
    function skip(val) { mainVid.currentTime += val; }
    
    function fullSc() {
        if (mainVid.requestFullscreen) mainVid.requestFullscreen();
        else if (mainVid.webkitEnterFullscreen) mainVid.webkitEnterFullscreen();
    }

    function formatT(s) {
        let m = Math.floor(s / 60);
        s = Math.floor(s % 60);
        return (m < 10 ? '0' : '') + m + ":" + (s < 10 ? '0' : '') + s;
    }

    mainVid.ontimeupdate = () => {
        seek.value = (mainVid.currentTime / mainVid.duration) * 100 || 0;
        timer.innerText = formatT(mainVid.currentTime) + " / " + formatT(mainVid.duration || 0);
    };

    seek.oninput = () => {
        mainVid.currentTime = (seek.value / 100) * mainVid.duration;
    };
</script>

</body>
</html>
