<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Smooth Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 900px; padding: 15px; }
        #inputArea { background: #111; padding: 25px; border-radius: 15px; text-align: center; }
        input { width: 100%; padding: 15px; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .play-btn { width: 100%; padding: 14px; background: #ff0000; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .player-wrapper { display: none; width: 100%; border-radius: 12px; overflow: hidden; }
        :root { --plyr-color-main: #ff0000; }
        .share-btn { width: 100%; margin-top: 20px; background: #007bff; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="inputArea">
        <h2 style="margin-bottom: 20px;">Spider Official</h2>
        <input type="text" id="linkInput" placeholder="Paste Video / M3U8 Link...">
        <button class="play-btn" onclick="initPlayer()">Play Smoothly</button>
    </div>

    <div id="playerWrapper" class="player-wrapper">
        <video id="videoPlayer" playsinline controls crossorigin="anonymous"></video>
        <button id="copyBtn" class="share-btn" onclick="copyLink()">🔗 Copy Encrypted Share Link</button>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    let player;
    let hls;

    function initPlayer() {
        const url = document.getElementById('linkInput').value.trim();
        if(!url) return alert("Link dalo bhai!");

        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('playerWrapper').style.display = 'block';

        const video = document.getElementById('videoPlayer');

        if (url.includes('.m3u8')) {
            if (Hls.isSupported()) {
                // Buffering Fix Settings
                hls = new Hls({
                    maxBufferLength: 30,        // Buffer 30 seconds ahead
                    maxMaxBufferLength: 60,     
                    enableWorker: true,         // Performance boost
                    lowLatencyMode: true,       
                    backBufferLength: 30        // Keeps previous video in memory
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    setupPlyr(video, hls.levels.map(l => l.height));
                });

                // Error handling to prevent freezing
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                            default: hls.destroy(); break;
                        }
                    }
                });
            }
        } else {
            video.src = url;
            setupPlyr(video, []);
        }
    }

    function setupPlyr(video, qualities) {
        player = new Plyr(video, {
            settings: ['quality', 'speed'],
            quality: {
                default: 0,
                options: [0, ...qualities],
                forced: true,
                onChange: (q) => {
                    if (hls) {
                        if (q === 0) hls.currentLevel = -1;
                        else hls.currentLevel = qualities.indexOf(q);
                    }
                }
            },
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });
        video.play();
    }

    function copyLink() {
        const url = document.getElementById('linkInput').value.trim();
        const shareURL = window.location.origin + window.location.pathname + "?v=" + btoa(url);
        navigator.clipboard.writeText(shareURL).then(() => {
            alert("Copied!");
        });
    }

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const v = params.get('v');
        if(v) {
            document.getElementById('linkInput').value = atob(v);
            initPlayer();
        }
    }
</script>

</body>
</html>
