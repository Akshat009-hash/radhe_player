<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spider PLAYER </title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { --plyr-color-main: #ff0000; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden;
        }
        .container { width: 100%; max-width: 900px; padding: 15px; }
        #inputArea { background: #111; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        input { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .play-btn { width: 100%; padding: 15px; background: #ff0000; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .player-wrapper { display: none; width: 100%; border-radius: 15px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

<div class="container">
    <div id="inputArea">
        <h2 style="color: #ff0000;">SPIDER START-FIX</h2>
        <input type="text" id="linkInput" placeholder="Paste Link Here...">
        <button class="play-btn" onclick="handleManualPlay()">START FROM BEGINNING</button>
    </div>

    <div id="playerWrapper" class="player-wrapper">
        <video id="videoPlayer" playsinline controls></video>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    let player;
    let hls;

    function startPlayer(url) {
        if(!url) return;
        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('playerWrapper').style.display = 'block';

        const video = document.getElementById('videoPlayer');

        if (url.includes('.m3u8') && Hls.isSupported()) {
            if(hls) hls.destroy();
            
            hls = new Hls({
                enableWorker: true,
                // --- FORCE START FROM BEGINNING ---
                startPosition: 0,            // Ye video ko 0:00 se start karega
                liveSyncDuration: 30,        // Buffering rokne ke liye 30 sec ka buffer backup
                backBufferLength: Infinity,  // Jitna piche jana chaho ja sakte ho
                maxBufferLength: 60
            });

            hls.loadSource(url);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                setupPlyr(video, hls.levels.map(l => l.height));
                // Extra security: force seek to 0 after metadata loads
                video.currentTime = 0; 
            });

            hls.on(Hls.Events.ERROR, (e, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                }
            });
        } else {
            video.src = url;
            setupPlyr(video, []);
        }
    }

    function handleManualPlay() {
        const url = document.getElementById('linkInput').value.trim();
        if(url) startPlayer(url);
    }

    function setupPlyr(video, qualities) {
        if(player) player.destroy();
        player = new Plyr(video, {
            controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'fullscreen'],
            settings: ['quality', 'speed'],
            invertTime: false, // Remaining time ki jagah Total time dikhayega
            seekTime: 10
        });

        // Rotation lock fix
        player.on('enterfullscreen', () => {
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {}); 
        });

        video.play().catch(() => {});
    }
</script>
</body>
</html>
